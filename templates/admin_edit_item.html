<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>編輯菜單</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="card">
        <div class="card-header">
            <h5>編輯菜單：{{ item.name }}</h5>
        </div>
        <div class="card-body">
            <form action="/admin/update/{{ item.id }}" method="POST" enctype="multipart/form-data">
                <div class="mb-2"><label class="form-label">名稱</label><input class="form-control" name="name" value="{{ item.name }}" required></div>
                <div class="mb-2"><label class="form-label">價格</label><input class="form-control" type="number" name="price" value="{{ item.price }}" required></div>
                <div class="mb-2"><label class="form-label">分類</label><input class="form-control" name="category" value="{{ item.category }}"></div>
                <div class="mb-2"><label class="form-label">描述</label><input class="form-control" name="description" value="{{ item.description }}"></div>
                <div class="form-check form-switch mb-2"><input type="checkbox" class="form-check-input" name="recommended" id="recommended" {% if item.is_recommended %}checked{% endif %}><label for="recommended" class="form-check-label">熱門推薦</label></div>
                <div class="form-check form-switch mb-2"><input type="checkbox" class="form-check-input" name="is_new" id="is_new" {% if item.is_new %}checked{% endif %}><label for="is_new" class="form-check-label">新品上架</label></div>
                <div class="mb-2"><label class="form-label">上傳新圖片</label><input class="form-control" type="file" name="image" accept="image/*"></div>
                <div class="d-flex gap-2"><button class="btn btn-primary" type="submit">更新</button><a class="btn btn-secondary" href="/admin">取消</a></div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
