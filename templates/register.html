<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>加入會員 - 自助點餐系統</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); color: #f8f9fa; }
        .card { border-radius: 18px; box-shadow: 0 15px 35px rgba(0,0,0,0.25); }
        .btn-brand { background-color: #ff7f50; color: white; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card overflow-hidden">
                <div class="row g-0">
                    <div class="col-md-6 d-none d-md-block" style="background: url('https://images.unsplash.com/photo-1498654896293-37aacf113fd9?auto=format&fit=crop&w=1000&q=80') center/cover;">
                    </div>
                    <div class="col-md-6">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-center mb-4">
                                <div class="me-2"><i class="bi bi-person-circle fs-1 text-warning"></i></div>
                                <div>
                                    <h4 class="mb-0">加入會員</h4>
                                    <small class="text-muted">註冊即可快速人臉登入與結帳</small>
                                </div>
                            </div>
                            <form action="/register" method="POST" enctype="multipart/form-data" class="mb-3">
                                <div class="mb-3">
                                    <label class="form-label">姓名</label>
                                    <input class="form-control" type="text" name="name" value="{{ name }}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">電話</label>
                                    <input class="form-control" type="text" name="phone" value="{{ phone }}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">上傳照片</label>
                                    <input class="form-control" type="file" name="photo" accept="image/*">
                                </div>
                                <input type="hidden" name="captured_photo" value="{{ captured_photo }}">
                                {% if captured_photo %}
                                <div class="alert alert-success p-2 mb-3">
                                    <i class="bi bi-check-circle-fill"></i> 已成功擷取臉部影像，請送出完成註冊。
                                </div>
                                <div class="mb-3 text-center">
                                    <img src="{{ url_for('static', filename='member/' + captured_photo) }}" class="img-fluid rounded" alt="人臉預覽">
                                </div>
                                {% endif %}
                                <div class="d-grid gap-2 mb-2">
                                    <button class="btn btn-brand" type="submit" name="action" value="webcam">📸 開啟相機自動拍攝</button>
                                    <button class="btn btn-success" type="submit" name="action" value="register">💾 上傳照片並註冊</button>
                                </div>
                            </form>
                            <div class="text-center">
                                <a href="/" class="text-decoration-none"><i class="bi bi-arrow-left"></i> 返回首頁</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
